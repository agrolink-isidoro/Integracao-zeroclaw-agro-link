[tool:pytest]
DJANGO_SETTINGS_MODULE = sistema_agropecuario.settings.test
python_files = tests.py test_*.py *_tests.py
# testpaths limita a coleta ao diretório apps/ apenas
testpaths = apps
addopts = --tb=short --strict-markers

# Avoid walking the repo-level `tests` directory which can create an
# import-name collision with package-level `apps/*/tests` packages.
norecursedirs = ../../tests
markers =
    django_db: Mark tests that require database access
    slow: Mark slow integration tests (e.g. SEFAZ e2e)
    slow: Mark slow integration tests (e.g. SEFAZ e2e)