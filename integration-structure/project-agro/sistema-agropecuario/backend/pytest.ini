[tool:pytest]
DJANGO_SETTINGS_MODULE = sistema_agropecuario.settings.test
python_files = tests.py test_*.py *_tests.py
# testpaths limita a coleta ao diretório apps/ apenas
testpaths = apps
addopts = --tb=short --strict-markers -n auto --dist loadscope

# Evitar walking do `tests` directory de repo-level que causa import collision
norecursedirs = ../../tests
markers =
    django_db: Mark tests that require database access
    slow: Mark slow integration tests (e.g. SEFAZ e2e)