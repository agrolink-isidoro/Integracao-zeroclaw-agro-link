# Snippet: Adicionar serviços Celery ao docker-compose.yml principal
# Copiar as seções worker e beat abaixo para seu docker-compose.yml ou include como override

services:
  worker:
    build: ./backend
    working_dir: /app/backend
    command: celery -A sistema_agropecuario worker --loglevel=info --concurrency=1
    volumes:
      - ./:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis
      - db

  beat:
    build: ./backend
    working_dir: /app/backend
    command: celery -A sistema_agropecuario beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis
      - db

