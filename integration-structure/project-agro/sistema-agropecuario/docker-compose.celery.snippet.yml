# Nota: Ajuste "build", "working_dir" e variáveis de ambiente conforme sua configuração do backend.
# Depois de adicionar, rode:
# docker-compose up -d db redis backend worker beat
# E aplique migrações dentro do backend (docker-compose exec backend python manage.py migrate)
