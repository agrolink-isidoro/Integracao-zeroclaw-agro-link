name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel concurrent runs on the same branch to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Backend – pytest (SQLite, sem PostGIS)
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-structure/project-agro/sistema-agropecuario/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: integration-structure/project-agro/sistema-agropecuario/backend/requirements.txt

      # Libs necessárias para xmlsec, lxml, poppler (NF-e/PDF) e libpq
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libxml2-dev libxslt1-dev \
            libxmlsec1-dev libxmlsec1-openssl xmlsec1 \
            libssl-dev libjpeg-dev poppler-utils \
            libpq-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pytest (SQLite in-memory, sem PostGIS)
        env:
          USE_SQLITE_FOR_TESTS: '1'
          DJANGO_SETTINGS_MODULE: sistema_agropecuario.settings.test
          SECRET_KEY: 'ci-only-insecure-key'
          DEBUG: 'True'
          # Isidoro/ZeroClaw – mocks cobertos pelos testes, não requer chave real
          ISIDORO_API_KEY: 'ci-placeholder'
        run: pytest --tb=short -q

  # ─────────────────────────────────────────────
  # Job 2: Frontend – TypeScript + Vite build
  # ─────────────────────────────────────────────
  frontend-check:
    name: Frontend (tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-structure/project-agro/sistema-agropecuario/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: integration-structure/project-agro/sistema-agropecuario/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript – verificação de tipos
        run: npx tsc --noEmit

      - name: Vite – build de produção
        run: npm run build
        env:
          NODE_ENV: production
          # Variáveis VITE_ são opcionais no build; ficam undefined em prod
          # se não definidas. Configure secrets se o build precisar delas.
