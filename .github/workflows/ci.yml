name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel concurrent runs on the same branch to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Backend – pytest com PostGIS real (service container)
  # ─────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest + PostGIS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-structure/project-agro/sistema-agropecuario/backend

    services:
      db:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: agro_db
          POSTGRES_USER: agro_user
          POSTGRES_PASSWORD: agro_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agro_user -d agro_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: integration-structure/project-agro/sistema-agropecuario/backend/requirements.txt

      # Libs necessárias para xmlsec, lxml, poppler, GDAL, pyzbar, WeasyPrint,
      # pytesseract – espelho exato do Dockerfile de produção
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libxml2-dev libxslt1-dev \
            libxmlsec1-dev libxmlsec1-openssl xmlsec1 \
            libssl-dev libjpeg-dev poppler-utils \
            libpq-dev postgresql-client \
            gdal-bin libgdal-dev libgeos-dev libproj-dev \
            libzbar0 libzbar-dev \
            tesseract-ocr libtesseract-dev libleptonica-dev \
            libcairo2 libcairo2-dev \
            libpango-1.0-0 libpango1.0-dev libpangoft2-1.0-0 \
            fonts-dejavu-core \
            libffi-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://agro_user:agro_password@localhost:5432/agro_db
          DJANGO_SETTINGS_MODULE: sistema_agropecuario.settings.test
          SECRET_KEY: 'ci-only-insecure-key'
          GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/
          GDAL_CONFIG: /usr/bin/gdal-config
        run: python manage.py migrate --noinput

      - name: Run pytest (PostGIS real)
        env:
          DATABASE_URL: postgresql://agro_user:agro_password@localhost:5432/agro_db
          DJANGO_SETTINGS_MODULE: sistema_agropecuario.settings.test
          SECRET_KEY: 'ci-only-insecure-key'
          DEBUG: 'True'
          ISIDORO_API_KEY: 'ci-placeholder'
          GDAL_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/
          GDAL_CONFIG: /usr/bin/gdal-config
        run: pytest --tb=short -q

  # ─────────────────────────────────────────────
  # Job 2: Frontend – TypeScript + Vite build
  # ─────────────────────────────────────────────
  frontend-check:
    name: Frontend (tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integration-structure/project-agro/sistema-agropecuario/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: integration-structure/project-agro/sistema-agropecuario/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript – verificação de tipos
        run: npx tsc --noEmit

      - name: Vite – build de produção
        run: npm run build
        env:
          NODE_ENV: production
          # Variáveis VITE_ são opcionais no build; ficam undefined em prod
          # se não definidas. Configure secrets se o build precisar delas.
