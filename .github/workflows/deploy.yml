name: Deploy → GCP Cloud Run

# Dispara SOMENTE após merge na main (CI já passou via PR)
on:
  push:
    branches: [main]

# ─── Segredos necessários no GitHub (Settings → Secrets → Actions) ────────
# GCP_PROJECT_ID   → ID do projeto GCP  ex: agro-system-prod-2026
# GCP_SA_KEY       → JSON da Service Account em base64
#                    (gcloud iam service-accounts keys create key.json ...)
#                    (cat key.json | base64 -w 0 → cole aqui)
# GCP_REGION       → Região Cloud Run          ex: us-central1
# DATABASE_URL     → URL completa do Cloud SQL Proxy ou Public IP
# REDIS_URL        → URL do Redis (Memorystore ou externo)
# SECRET_KEY       → Django SECRET_KEY de produção
# ISIDORO_API_KEY  → Gemini API Key
# CERT_ENCRYPTION_KEY → Chave de criptografia de certificados
# ─────────────────────────────────────────────────────────────────────────

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE_BACKEND: gcr.io/${{ secrets.GCP_PROJECT_ID }}/agro-backend
  SERVICE_BACKEND: agro-backend

concurrency:
  group: deploy-main
  cancel-in-progress: false  # nunca cancelar um deploy em andamento

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build backend image → GCR → deploy Cloud Run
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Cloud Run)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para GCR
        run: gcloud auth configure-docker --quiet

      - name: Build e push da imagem do backend
        working-directory: integration-structure/project-agro/sistema-agropecuario/backend
        run: |
          docker build \
            -t $IMAGE_BACKEND:${{ github.sha }} \
            -t $IMAGE_BACKEND:latest \
            .
          docker push $IMAGE_BACKEND:${{ github.sha }}
          docker push $IMAGE_BACKEND:latest

      - name: Deploy no Cloud Run
        run: |
          gcloud run deploy $SERVICE_BACKEND \
            --image=$IMAGE_BACKEND:${{ github.sha }} \
            --region=$GCP_REGION \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=5 \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --set-env-vars="REDIS_URL=${{ secrets.REDIS_URL }}" \
            --set-env-vars="SECRET_KEY=${{ secrets.SECRET_KEY }}" \
            --set-env-vars="ISIDORO_API_KEY=${{ secrets.ISIDORO_API_KEY }}" \
            --set-env-vars="ISIDORO_LLM_MODEL=gemini-2.5-flash" \
            --set-env-vars="CERT_ENCRYPTION_KEY=${{ secrets.CERT_ENCRYPTION_KEY }}" \
            --set-env-vars="DEBUG=False" \
            --set-env-vars="GCP_PROJECT=${{ secrets.GCP_PROJECT_ID }}" \
            --set-env-vars="SEFAZ_AMBIENTE=1" \
            --set-env-vars="SEFAZ_SIMULATE_ONLY=False" \
            --quiet

      - name: Verificar URL do serviço
        run: |
          URL=$(gcloud run services describe $SERVICE_BACKEND \
            --region=$GCP_REGION \
            --format='value(status.url)')
          echo "✅ Backend disponível em: $URL"
          echo "BACKEND_URL=$URL" >> $GITHUB_ENV

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Build frontend → Firebase Hosting / Cloud Storage
  # (descomente quando o projeto Firebase/bucket estiver configurado)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    runs-on: ubuntu-latest
    needs: deploy-backend
    # Remova o 'if' quando o Firebase estiver configurado
    if: ${{ false }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: integration-structure/project-agro/sistema-agropecuario/frontend/package-lock.json

      - name: Instalar dependências
        working-directory: integration-structure/project-agro/sistema-agropecuario/frontend
        run: npm ci

      - name: Build de produção
        working-directory: integration-structure/project-agro/sistema-agropecuario/frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.BACKEND_URL }}

      # Descomente e configure quando tiver o Firebase project
      # - name: Deploy Firebase Hosting
      #   uses: FirebaseExtended/action-hosting-deploy@v0
      #   with:
      #     repoToken: ${{ secrets.GITHUB_TOKEN }}
      #     firebaseServiceAccount: ${{ secrets.FIREBASE_SA_KEY }}
